<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow A Grade Plus — เตรียมตัวเข้ามหาวิทยาลัย</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4ED;--card:#fff;--pri:#428BC2;--pri2:#0B1957;--sec:#D3B3DB;--sec2:#B98FC4;--txt:#0B1957;--muted:#6C7A89;--border:#E5E0F2;--ok:#55B496;--warn:#F3C34F;--err:#E06F6F;--r-sm:8px;--r-md:16px;--r-lg:24px;--sh:0 10px 25px rgba(66,139,194,.14);--midnight:#0B1957;--sapphire:#428BC2;--petal:#E8D9ED;--lace:#F7F4ED;--lavender:#D3B3DB;--bridal:#E9F3FF}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Sarabun','Mitr',sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}
h1,h2,h3,h4{font-family:'Mitr',sans-serif;font-weight:500;margin-bottom:.4em}
.hidden{display:none!important}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--pri);color:#fff;border:none;border-radius:var(--r-lg);padding:12px 28px;font-size:1rem;font-weight:500;cursor:pointer;transition:all .25s;text-decoration:none;box-shadow:0 4px 12px rgba(124,173,211,.25);font-family:'Mitr',sans-serif}
.btn:hover{background:var(--pri2);transform:translateY(-2px);box-shadow:0 6px 16px rgba(124,173,211,.35)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:0 0;color:var(--muted);border:2px solid var(--border);box-shadow:none}
.btn.ghost:hover{border-color:var(--muted);color:var(--txt)}
.btn.sec{background:var(--sec);box-shadow:0 4px 12px rgba(232,155,182,.25)}
.btn.sec:hover{background:var(--sec2)}
.btn.sm{padding:8px 18px;font-size:.88rem;border-radius:12px}
.btn.danger{background:var(--err)}
input[type=text],input[type=password],input[type=email],input[type=number],input[type=date],select,textarea{width:100%;padding:13px 16px;border:2px solid var(--border);background:#fff;border-radius:var(--r-md);color:var(--txt);font-size:.95rem;outline:0;transition:all .2s}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(124,173,211,.15)}
textarea{resize:vertical;min-height:80px}
/* AUTH VIEW */
.auth-screen{display:flex;min-height:100vh}
.auth-left{flex:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:var(--bg)}
.auth-right{flex:.8;background:linear-gradient(160deg,var(--midnight) 0%,var(--sapphire) 100%);display:flex;align-items:center;justify-content:center;padding:40px}
.auth-logo{font-family:'Outfit','Mitr',sans-serif;font-size:2.6rem;font-weight:700;color:var(--midnight);margin-bottom:8px;letter-spacing:1px}
.auth-sub{color:var(--pri);font-size:1.1rem;margin-bottom:24px}
.auth-avatar{width:300px;height:300px;margin-bottom:20px}
.auth-card{background:var(--lace);border-radius:var(--r-lg);padding:36px;width:100%;max-width:420px;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.auth-title{text-align:center;font-family:'Outfit','Mitr',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:20px;color:var(--txt)}
.auth-roles{display:flex;justify-content:center;gap:24px;margin-bottom:20px}
.auth-roles label{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:500;color:var(--muted)}
.auth-roles input[type=radio]{width:18px;height:18px;accent-color:#2F69B2}
.auth-group{margin-bottom:16px}
.auth-group label{display:block;margin-bottom:6px;font-size:.88rem;font-weight:500;color:var(--muted)}
.auth-group input{background:#fff;border:1px solid var(--border);padding:12px 16px}
.auth-toggle{text-align:center;margin-top:16px;font-size:.9rem;color:var(--muted)}
.auth-toggle a{color:var(--pri);cursor:pointer;font-weight:600;text-decoration:underline}
.auth-err{color:var(--err);font-size:.88rem;text-align:center;margin-bottom:12px;min-height:20px}
/* ONBOARDING */
.onboard-wrap{max-width:720px;margin:60px auto;padding:24px}
.onboard-card{background:#FAF6ED;border-radius:var(--r-lg);padding:40px;box-shadow:var(--sh)}
.onboard-step{font-size:.9rem;color:var(--pri);font-weight:600;margin-bottom:8px}
.sel-title{font-size:1.4rem;font-weight:600;margin-bottom:16px}
.sel-title .hl{color:var(--sec)}
.opt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.opt-item{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:14px 20px;border-radius:50px;cursor:pointer;transition:all .2s;border:2px solid transparent;user-select:none}
.opt-item:hover{transform:translateX(4px);box-shadow:0 4px 10px rgba(0,0,0,.05)}
.opt-item.sel{border-color:var(--pri);background:#F0F7FC}
.opt-item .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:#fff;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt-item.sel .dot{border-color:var(--pri);background:var(--pri)}
.opt-item.sel .dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.fac-box{background:#fff;border:1px solid var(--border);border-radius:var(--r-md);max-height:260px;overflow-y:auto;padding:12px;margin-bottom:20px}
.fac-item{display:flex;align-items:center;padding:10px 14px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:4px;transition:all .15s}
.fac-item:hover{background:rgba(124,173,211,.08)}
.fac-item input{margin-right:12px;width:18px;height:18px;accent-color:var(--pri)}
.fac-item.sel{background:#F0F7FC;font-weight:500}
.onboard-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:16px}
/* APP LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:270px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px;position:fixed;top:0;left:0;height:100vh;z-index:10}
.sidebar-logo{font-family:'Outfit','Mitr',sans-serif;font-size:1.4rem;font-weight:700;color:var(--pri);margin-bottom:28px;display:flex;align-items:center;gap:8px}
.sidebar-logo span{font-size:1.6rem}
.sb-menu{list-style:none;display:flex;flex-direction:column;gap:6px;flex:1}
.sb-menu li a{display:flex;align-items:center;gap:12px;padding:11px 16px;color:var(--muted);text-decoration:none;border-radius:var(--r-md);font-weight:500;transition:all .2s;cursor:pointer;font-size:.95rem}
.sb-menu li.active a,.sb-menu li a:hover{background:rgba(124,173,211,.12);color:var(--pri2)}
.sb-user{border-top:1px solid var(--border);padding-top:16px;display:flex;align-items:center;justify-content:space-between}
.sb-user-info{display:flex;flex-direction:column}
.sb-user-name{font-weight:600;font-size:.95rem}
.sb-user-role{font-size:.8rem;color:var(--muted)}
.sb-logout{background:0 0;border:0;color:var(--err);cursor:pointer;padding:8px;border-radius:50%;font-size:1.2rem}
.sb-logout:hover{background:rgba(224,111,111,.1)}
.main{flex:1;margin-left:270px;padding:36px;background:var(--bg);min-height:100vh}
.page-title{font-size:1.6rem;margin-bottom:24px}
/* WIDGETS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:28px}
.widget{background:#fff;border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh);display:flex;flex-direction:column}
.widget-label{font-size:.95rem;font-weight:600;color:var(--muted);margin-bottom:10px}
.widget-val{font-size:2.6rem;font-weight:700;font-family:'Outfit',sans-serif;color:var(--txt);line-height:1}
.widget-sub{font-size:.85rem;color:var(--muted);margin-top:6px}
/* BADGES */
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.83rem;font-weight:500;margin:0 6px 6px 0}
.badge.blue{background:rgba(124,173,211,.14);color:var(--pri2)}
.badge.pink{background:rgba(232,155,182,.14);color:var(--sec2)}
.badge.green{background:rgba(85,180,150,.14);color:var(--ok)}
/* PROGRESS BAR */
.pbar-wrap{background:var(--border);height:14px;border-radius:10px;overflow:hidden;margin:10px 0;position:relative}
.pbar-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.1,.8,.3,1)}
.pbar-mark{position:absolute;top:0;bottom:0;width:3px;background:var(--sec);z-index:2}
/* GAP CARDS */
.gap-card{border-left:5px solid var(--border);padding:14px 16px;background:#F8FAFC;border-radius:var(--r-sm);margin-bottom:10px}
.gap-card.danger{border-left-color:var(--err);background:rgba(224,111,111,.05)}
.gap-card.warning{border-left-color:var(--warn);background:rgba(243,195,79,.05)}
.gap-card.success{border-left-color:var(--ok);background:rgba(85,180,150,.05)}
/* GRADE TABLE */
.g-table{width:100%;border-collapse:collapse;margin-top:12px}
.g-table th,.g-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border)}
.g-table th{font-weight:600;color:var(--muted);font-size:.9rem}
.g-table select{padding:8px 10px;border-radius:var(--r-sm);border:1px solid var(--border);width:100px}
/* DOTS */
.dot-status{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px}
.dot-status.red{background:var(--err);box-shadow:0 0 8px var(--err)}
.dot-status.yellow{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.dot-status.green{background:var(--ok);box-shadow:0 0 8px var(--ok)}
/* PLANNER */
.plan-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-radius:var(--r-md);margin-bottom:10px;border:1px solid var(--border);transition:all .2s}
.plan-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.04)}
.plan-item.done{opacity:.6;background:#F8FAFC}
.plan-item.done .plan-text{text-decoration:line-through}
.plan-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--ok);margin-right:12px;cursor:pointer}
/* FORUM */
.thread-card{background:#fff;border-radius:var(--r-md);padding:20px;border:1px solid var(--border);margin-bottom:14px;cursor:pointer;transition:all .2s}
.thread-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.04);border-color:var(--pri)}
.thread-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.85rem;color:var(--muted)}
.reply-count{background:#F1F5F9;padding:3px 10px;border-radius:12px;font-size:.8rem;font-weight:500}
.reply-card{background:#fff;border-radius:var(--r-md);padding:18px;border:1px solid var(--border);margin-left:28px;margin-bottom:10px;position:relative}
.reply-card::before{content:'';position:absolute;left:-16px;top:22px;width:16px;height:2px;background:var(--border)}
/* PRETEST */
.pt-header{background:linear-gradient(135deg,var(--pri) 0%,#B4CDE6 100%);color:#fff;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:36px;border-top:10px solid #2F69B2}
.pt-qcard{background:#fff;border-radius:var(--r-md);padding:22px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 4px 6px rgba(0,0,0,.02)}
.pt-qtext{font-size:1.1rem;font-weight:500;margin-bottom:16px}
.pt-opt{display:flex;align-items:center;padding:11px 14px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:all .15s}
.pt-opt:hover{background:#F8FAFC;border-color:var(--border)}
.pt-opt input{margin-right:12px;width:20px;height:20px;accent-color:var(--pri)}
.pt-result{text-align:center;padding:40px;background:#fff;border-radius:var(--r-lg);border:1px solid var(--border)}
.pt-score{font-size:4rem;font-weight:700;font-family:'Outfit',sans-serif}
/* PRACTICE */
.prac-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
.prac-day{background:#F1F5F9;border-radius:var(--r-sm);aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:600;transition:all .2s;border:2px solid transparent;font-size:.85rem}
.prac-day:hover{border-color:var(--pri);transform:scale(1.05)}
.prac-day.done{background:var(--ok);color:#fff}
/* ALUMNI */
.alumni-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.alumni-card{background:#fff;border-radius:var(--r-lg);padding:22px;border:1px solid var(--border);text-align:center;transition:all .2s}
.alumni-card:hover{transform:translateY(-4px);box-shadow:var(--sh)}
.alumni-avatar{width:72px;height:72px;border-radius:50%;background:#F0F7FC;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border:3px solid var(--pri);font-size:2rem}
.alumni-name{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.alumni-tag{display:inline-block;padding:3px 10px;border-radius:12px;background:#FFF1F2;color:#E11D48;font-size:.78rem;font-weight:500;margin-bottom:10px}
/* TABS */
.tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:10px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:var(--r-md);font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted);font-size:.95rem}
.tab.active{background:var(--pri);color:#fff}
/* ROSTER TABLE */
.roster-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.roster-table th,.roster-table td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--border)}
.roster-table th{background:#F8FAFC;font-weight:600;color:var(--muted);font-size:.9rem}
.roster-table tr:hover{background:#FAFBFD}
/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#fff;border-radius:var(--r-lg);padding:32px;width:100%;max-width:520px;box-shadow:0 20px 40px rgba(0,0,0,.1);max-height:90vh;overflow-y:auto}
/* RESPONSIVE */
@media(max-width:900px){.auth-screen{flex-direction:column}.auth-left,.auth-right{flex:none;width:100%;min-height:auto;padding:28px 20px}.auth-avatar{width:200px;height:200px}.app{flex-direction:column}.sidebar{width:100%;height:auto;position:relative;border-right:0;border-bottom:1px solid var(--border)}.main{margin-left:0}.opt-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ========== VIEW: AUTH ========== -->
<div id="view-auth" class="auth-screen">
  <div class="auth-left">
    <div class="auth-logo">WELCOME TO</div>
  
    <div class="auth-sub" style="font-family:'Mitr',sans-serif;font-size:1.3rem;color:var(--sapphire);font-weight:500">Grow A Grade+</div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <!-- Login Form (default) -->
      <div id="form-login">
        <div class="auth-title">Log in</div>
        <div class="auth-roles">
          <label><input type="radio" name="loginRole" value="student" checked> student</label>
          <label><input type="radio" name="loginRole" value="teacher"> teacher</label>
        </div>
        <div class="auth-err" id="login-err"></div>
        <div class="auth-group"><input type="text" id="login-user" placeholder="student / teacher number"></div>
        <div class="auth-group"><input type="password" id="login-pass" placeholder="password"></div>
        <div style="text-align:center;margin-top:20px"><button class="btn" onclick="doLogin()" style="min-width:180px">confirm</button></div>
        <div class="auth-toggle">ยังไม่มีบัญชี? <a onclick="toggleAuth('register')">สมัครสมาชิก</a></div>
      </div>
      <!-- Register Form -->
      <div id="form-register" class="hidden">
        <div class="auth-title">sign in</div>
        <div class="auth-roles">
          <label><input type="radio" name="regRole" value="student" checked onchange="updateUsernamePlaceholder()"> student</label>
          <label><input type="radio" name="regRole" value="house_teacher" onchange="updateUsernamePlaceholder()"> ครูบ้าน</label>
          <label><input type="radio" name="regRole" value="guidance_teacher" onchange="updateUsernamePlaceholder()"> ครูแนะแนว</label>
        </div>
        <div class="auth-err" id="reg-err"></div>
        <div class="auth-group"><input type="email" id="reg-email" placeholder="email"></div>
        <div class="auth-group"><input type="text" id="reg-user" placeholder="s + ตัวเลข 5 หลัก เช่น s12345"></div>
        <div class="auth-group"><input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล"></div>
        <div class="auth-group"><input type="password" id="reg-pass" placeholder="password"></div>
        <div style="text-align:center;margin-top:20px"><button class="btn" onclick="doRegister()" style="min-width:180px">continue</button></div>
        <div class="auth-toggle">มีบัญชีอยู่แล้ว? <a onclick="toggleAuth('login')">เข้าสู่ระบบ</a></div>
      </div>
    </div>
  </div>
</div>

<!-- ========== VIEW: ONBOARDING ========== -->
<div id="view-onboard" class="hidden">
  <div class="onboard-wrap">
    <div class="onboard-card" id="onboard-content"></div>
  </div>
</div>

<!-- ========== VIEW: APP (Dashboard) ========== -->
<div id="view-app" class="hidden app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-content"></main>
</div>

<!-- ========== MODAL CONTAINER ========== -->
<div id="modal-root"></div>

<script>
// ============================
// DATA & CONFIGURATION
// ============================

{id:1,name:'บ้านวิทยาศาสตร์สุขภาพ',desc:'แพทย์ เภสัช พยาบาล ทันตะ สหเวช สัตวแพทย์',color:'#E89BB6',keywords:['แพทย์','เภสัช','พยาบาล','ทันต','สหเวช','สัตวแพทย์','จิตวิทยา','การแพทย์','วิทยาศาสตร์การแพทย์']},

{id:4,name:'บ้านสถาปัตยกรรม',desc:'สถาปัตยกรรม ออกแบบภายใน ภูมิสถาปัตย์ ออกแบบผลิตภัณฑ์ นิเทศศิลป์',color:'#D48C7E',keywords:['สถาปัตยกรรม','มัณฑนศิลป์','ออกแบบภายใน','ออกแบบผลิตภัณฑ์','ออกแบบแฟชั่น','นิเทศศิลป์']},

// แปลงชื่อแผนการเรียนให้ตรงกับคีย์ใน CURRICULUM_DATA (รองรับข้อมูลเก่าใน LocalStorage)
function normalizePlanName(p){
  if (!p) return '';
  p = p.trim();
  if (p.includes('วิศวกรรมข้อมูล') || p.includes('ปัญญาประดิษฐ์') || p.includes('วิทย์-เอไอ') || p.includes('วิทย์เอไอ')) return 'วิทย์-เอไอ';
  if (p.includes('วิทยาศาสตร์-คณิตศาสตร์') || p.includes('วิทย์-คณิต') || p.includes('วิทย์คณิต')) return 'วิทย์-คณิต';
  if (p.includes('ศิลป์-คณิต') || p.includes('ศิลป์-คำนวณ') || p.includes('ศิลป์คำนวณ')) return 'ศิลป์-คำนวณ';
  if (p.includes('ฝรั่งเศส')) return 'ศิลป์-ฝรั่งเศส';
  if (p.includes('จีน')) return 'ศิลป์-จีน';
  if (p.includes('ญี่ปุ่น')) return 'ศิลป์-ญี่ปุ่น';
  if (p.includes('คหกรรม')) return 'ศิลป์-คหกรรม';
  return p;
}
function getCurrentPlanName(){
  const stuInfo=(DB.g('students')||[]).find(s=>s.username===CUR.username);
  return stuInfo?normalizePlanName(stuInfo.plan):'';
}
// หน่วยกิตรวมโดยประมาณของเทอมหนึ่ง ๆ ตามหลักสูตรของแผนการเรียน (ใช้พยากรณ์เทอมที่ยังไม่ถึง)
const DEFAULT_TERM_CREDITS = 11;
function getTermCurriculumCredits(plan, lv, tm){
  const key = `${lv} ${tm}`;
  const subs = CURRICULUM_DATA[plan] && CURRICULUM_DATA[plan][key];
  if (!subs || !subs.length) return DEFAULT_TERM_CREDITS;
  return subs.reduce((s,x)=>s+x.cr, 0);
}

const $=s=>document.getElementById(s);
function show(id){document.querySelectorAll('#view-auth,#view-onboard,#view-app').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden')}
function getUserByName(u){return(DB.g('users')||[]).find(x=>x.username===u)}
function calcGPAX(stu){
  const stuInfo = (DB.g('students')||[]).find(s=>s.username===stu);
  const prevGPAX = stuInfo && stuInfo.prevGPAX ? parseFloat(stuInfo.prevGPAX) : 0;
  const prevCredits = stuInfo && stuInfo.prevCredits ? parseFloat(stuInfo.prevCredits) : 0;
  
  const gs=(DB.g('grades')||[]).filter(g=>g.stu===stu);
  let tc = prevCredits;
  let tp = prevGPAX * prevCredits;
  gs.forEach(g=>{tc+=g.cr;tp+=g.grade*g.cr});
  return tc>0?tp/tc:0;
}
function calcGroupGPA(stu,grp){const gs=(DB.g('grades')||[]).filter(g=>g.stu===stu&&g.grp===grp);if(!gs.length)return null;let tc=0,tp=0;gs.forEach(g=>{tc+=g.cr;tp+=g.grade*g.cr});return tc>0?tp/tc:0}
function getColor(stu){
  const tgts=(DB.g('student_targets')||[]).filter(t=>t.stu===stu);
  if(!tgts.length)return'yellow';
  const gpax=calcGPAX(stu);
  let maxMin=0;
  tgts.forEach(t=>{const m=TCAS_DATA.find(d=>d.uni===t.uni&&d.fac===t.fac);if(m&&m.min>maxMin)maxMin=m.min});
  if(maxMin===0)maxMin=3;
  if(gpax<=maxMin-0.5)return'red';
  if(gpax>=maxMin+0.31)return'green';
  return'yellow';
}
function getPracRec(sc){if(sc<=35)return{days:'5-7',lvl:'เข้มข้น',color:'var(--err)'};if(sc<=75)return{days:'3-5',lvl:'ปานกลาง',color:'var(--warn)'};return{days:'2',lvl:'รักษาระดับ',color:'var(--ok)'};}
function houseOf(stu){return(DB.g('student_houses')||[]).filter(h=>h.stu===stu).map(h=>HOUSES.find(x=>x.id===h.hId)).filter(Boolean)}
function pretestOf(stu){return(DB.g('student_pretests')||[]).filter(p=>p.stu===stu)}
function fmtDate(d){return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}

function toggleAuth(mode){
  $('form-login').classList.toggle('hidden',mode==='register');
  $('form-register').classList.toggle('hidden',mode==='login');
}
function updateUsernamePlaceholder(){
  const role=document.querySelector('input[name=regRole]:checked').value;
  const ph={student:'s + ตัวเลข 5 หลัก เช่น s12345',house_teacher:'baan + ชื่อบ้าน เช่น baanวิศวกรรมศาสตร์',guidance_teacher:'T + ตัวเลข 8 หลัก เช่น T12345678'};
  $('reg-user').placeholder=ph[role]||'';
}
function doLogin(){
  const u=$('login-user').value.trim(),p=$('login-pass').value;
  if(!u||!p){$('login-err').textContent='กรุณากรอกข้อมูลให้ครบ';return}
  const user=getUserByName(u);
  if(!user||user.password!==p){$('login-err').textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';return}
  CUR=user;
  localStorage.setItem('gp_session',u);
  if(user.role==='student'){
    const stu=(DB.g('students')||[]).find(s=>s.username===u);
    if(!stu){startOnboarding();return}
  }
  enterApp();
}
function doRegister(){
  const role=document.querySelector('input[name=regRole]:checked').value;
  const email=$('reg-email').value.trim(),u=$('reg-user').value.trim(),name=$('reg-name').value.trim(),p=$('reg-pass').value;
  if(!email||!u||!name||!p){$('reg-err').textContent='กรุณากรอกข้อมูลให้ครบ';return}
  // Validate username
  if(role==='student'&&!/^s\d{5}$/.test(u)){$('reg-err').textContent='รหัสนักเรียนต้องขึ้นต้นด้วย s ตามด้วยตัวเลข 5 หลัก เช่น s12345';return}
  if(role==='house_teacher'&&!/^baan.+/.test(u)){$('reg-err').textContent='รหัสครูบ้านต้องขึ้นต้นด้วย baan เช่น baanวิศวกรรมศาสตร์';return}
  if(role==='guidance_teacher'&&!/^T\d{8}$/.test(u)){$('reg-err').textContent='รหัสครูแนะแนวต้องขึ้นต้นด้วย T ตามด้วยตัวเลข 8 หลัก';return}
  if(getUserByName(u)){$('reg-err').textContent='ชื่อผู้ใช้นี้ถูกใช้งานแล้ว';return}
  const users=DB.g('users')||[];
  const newUser={username:u,email,password:p,role,displayName:name};
  users.push(newUser);DB.s('users',users);
  CUR=newUser;
  localStorage.setItem('gp_session',u);
  if(role==='student'){startOnboarding()}else{enterApp()}
}
function logout(){CUR=null;localStorage.removeItem('gp_session');show('view-auth');$('login-err').textContent='';$('login-user').value='';$('login-pass').value=''}

let onStep=1,onPlan='',onHouses=[],onFacs=[];
function startOnboarding(){show('view-onboard');onStep=1;renderOnboard()}
function renderOnboard(){
  const c=$('onboard-content');
  if(onStep===1){
    c.innerHTML=`<div class="onboard-step">ขั้นตอนที่ 1/3</div>
    <div class="sel-title">เลือก <span class="hl">แผนการเรียน</span> ของคุณ</div>
    <div class="opt-list" id="plan-list">${PLANS.map(p=>`<div class="opt-item${onPlan===p?' sel':''}" onclick="selPlan(this,'${p}')"><span>${p}</span><div class="dot"></div></div>`).join('')}</div>
    <div class="onboard-actions"><button class="btn" onclick="nextOnboard()">ถัดไป →</button></div>`;
  } else if(onStep===2){
    c.innerHTML=`<div class="onboard-step">ขั้นตอนที่ 2/3</div>
    <div class="sel-title">เลือก <span class="hl">บ้าน</span> ของคุณ <span style="font-size:.85rem;color:var(--muted)">(เลือกได้หลายบ้าน)</span></div>
    <div class="opt-grid" id="house-list">${HOUSES.map(h=>`<div class="opt-item${onHouses.includes(h.id)?' sel':''}" onclick="togHouse(this,${h.id})" style="border-radius:var(--r-md)"><span style="display:flex;align-items:center;gap:8px"><span style="width:14px;height:14px;border-radius:50%;background:${h.color};display:inline-block"></span>${h.name}</span><div class="dot"></div></div>`).join('')}</div>
    <div class="onboard-actions"><button class="btn ghost" onclick="onStep=1;renderOnboard()">← ย้อนกลับ</button><button class="btn" onclick="nextOnboard()">ถัดไป →</button></div>`;
  } else if(onStep===3){
    // Filter TCAS faculties by selected houses
    const facList=[];
    TCAS_DATA.forEach(t=>{
      const matchesHouse=onHouses.some(hId=>{const h=HOUSES.find(x=>x.id===hId);return h&&h.keywords.some(k=>t.fac.includes(k))});
      if(matchesHouse&&!facList.find(f=>f.uni===t.uni&&f.fac===t.fac)){facList.push(t)}
    });
    c.innerHTML=`<div class="onboard-step">ขั้นตอนที่ 3/3</div>
    <div class="sel-title">เลือก <span class="hl">คณะ</span> ที่คุณสนใจ <span style="font-size:.85rem;color:var(--muted)">(เลือกได้หลายคณะ)</span></div>
    <div class="fac-box" id="fac-list">${facList.length?facList.map((f,i)=>{const key=f.uni+'|'+f.fac;const sel=onFacs.includes(key);return`<div class="fac-item${sel?' sel':''}" onclick="togFac(this,'${key}')"><input type="checkbox" ${sel?'checked':''}><span>${f.uni} — ${f.fac} <small style="color:var(--muted)">(เกรดขั้นต่ำ ${f.min})</small></span></div>`}).join(''):'<p style="color:var(--muted);padding:12px">ไม่พบคณะที่ตรงกับบ้านที่เลือก</p>'}</div>
    <div class="onboard-actions"><button class="btn ghost" onclick="onStep=2;renderOnboard()">← ย้อนกลับ</button><button class="btn sec" onclick="finishOnboard()">เสร็จสิ้น ✓</button></div>`;
  }
}
function selPlan(el,p){onPlan=p;document.querySelectorAll('#plan-list .opt-item').forEach(e=>e.classList.remove('sel'));el.classList.add('sel')}
function togHouse(el,id){if(onHouses.includes(id))onHouses=onHouses.filter(x=>x!==id);else onHouses.push(id);el.classList.toggle('sel')}
function togFac(el,key){if(onFacs.includes(key))onFacs=onFacs.filter(x=>x!==key);else onFacs.push(key);el.classList.toggle('sel');el.querySelector('input').checked=onFacs.includes(key)}
function nextOnboard(){
  if(onStep===1&&!onPlan){alert('กรุณาเลือกแผนการเรียน');return}
  if(onStep===2&&!onHouses.length){alert('กรุณาเลือกอย่างน้อย 1 บ้าน');return}
  onStep++;renderOnboard();
}
function finishOnboard(){
  const stu=DB.g('students')||[];
  stu.push({username:CUR.username,plan:onPlan});
  DB.s('students',stu);
  const sh=DB.g('student_houses')||[];
  onHouses.forEach(hId=>sh.push({stu:CUR.username,hId}));
  DB.s('student_houses',sh);
  const st=DB.g('student_targets')||[];
  onFacs.forEach(key=>{const[uni,fac]=key.split('|');st.push({stu:CUR.username,uni,fac})});
  DB.s('student_targets',st);
  
  // Direct them to enter grades immediately
  enterApp();
  PAGE='grades';
  renderSidebar();
  renderPage();
  showWelcomeGradeModal();
}

// ============================
// REQUIRED-GRADE CALCULATOR
// เลือก "ม.และเทอมที่อยากรู้เกรดขั้นต่ำ" -> ระบบโหลดรายวิชาจริงของทุกเทอมก่อนหน้า (ตั้งแต่ ม.4 เทอม 1)
// ให้กรอกเกรดทีละวิชาให้ครบ -> กดยืนยัน -> คำนวณเกรดเฉลี่ยขั้นต่ำของเทอมที่เลือก
// ============================
const TERM_ORDER=[['ม.4','เทอม 1'],['ม.4','เทอม 2'],['ม.5','เทอม 1'],['ม.5','เทอม 2'],['ม.6','เทอม 1'],['ม.6','เทอม 2']];
const CALC_END_IDX=TERM_ORDER.findIndex(t=>t[0]==='ม.6'&&t[1]==='เทอม 1'); // GPAX ที่ใช้ยื่น TCAS นับถึง ม.6 เทอม 1 เป็นเทอมสุดท้าย
let CALC_PRIOR_TERMS=[]; // เทอมก่อนเทอมที่อยากรู้เกรด ที่ต้องกรอกเกรดให้ครบ

// เมื่อเปลี่ยนชั้นปีเป็น ม.6 ให้ปิดตัวเลือก "เทอม 2" เพราะ TCAS ใช้ GPAX ถึง ม.6 เทอม 1 เท่านั้น
function updateCalcTmOptions(){
  const lv=$('calc-lv').value;
  const tmSel=$('calc-tm');
  const opt2=[...tmSel.options].find(o=>o.value==='เทอม 2');
  if(opt2){
    opt2.disabled = (lv==='ม.6');
    if(lv==='ม.6' && tmSel.value==='เทอม 2') tmSel.value='เทอม 1';
  }
  clearRequiredCalc();
}
function getManualTermData(lv,tm){
  return (DB.g('term_gpa_manual')||[]).find(x=>x.stu===CUR.username&&x.lv===lv&&x.tm===tm)||null;
}
function saveManualTermData(lv,tm,gpa,credits){
  let list=(DB.g('term_gpa_manual')||[]).filter(x=>!(x.stu===CUR.username&&x.lv===lv&&x.tm===tm));
  list.push({stu:CUR.username,lv,tm,gpa,credits});
  DB.s('term_gpa_manual',list);
}
function clearRequiredCalc(){
  CALC_PRIOR_TERMS=[];
  if($('calc-prior-terms'))$('calc-prior-terms').innerHTML='';
  if($('calc-result'))$('calc-result').innerHTML='';
}

// ขั้นที่ 1: เลือก ม./เทอม ที่อยากรู้เกรดขั้นต่ำ -> โหลดรายวิชาจริงของทุกเทอมก่อนหน้าให้อัตโนมัติ (ถ้ายังไม่เคยกรอก)
function prepareRequiredCalc(){
  const lv=$('calc-lv').value, tm=$('calc-tm').value;
  const idx=TERM_ORDER.findIndex(t=>t[0]===lv&&t[1]===tm);
  if(idx===-1){alert('ไม่พบเทอมนี้ในระบบ');return}
  if(idx>CALC_END_IDX){alert('TCAS ใช้ GPAX ถึง ม.6 เทอม 1 เท่านั้น กรุณาเลือกเทอมไม่เกิน ม.6 เทอม 1');return}
  const priorTerms=TERM_ORDER.slice(0,idx);
  CALC_PRIOR_TERMS=priorTerms;
  $('calc-result').innerHTML='';
  const box=$('calc-prior-terms');

  if(!priorTerms.length){
    box.innerHTML=`<p style="font-size:.85rem;color:var(--muted);margin-top:10px">${lv} ${tm} เป็นเทอมแรกในระบบ ไม่มีเทอมก่อนหน้าที่ต้องกรอกเพิ่ม (ถ้ามีเกรดจากก่อนหน้านี้ เช่น ย้ายโรงเรียนมา ให้กรอกในช่อง "เกรดสะสมยกมา" ด้านบน)</p>
    <button class="btn sm" style="margin-top:10px" onclick="calcRequiredGradeUI('${lv}','${tm}')">✅ ยืนยันและคำนวณเกรดขั้นต่ำ</button>`;
    return;
  }

  const plan=getCurrentPlanName();
  if(!plan){
    box.innerHTML=`<p style="font-size:.85rem;color:var(--err);margin-top:10px">⚠️ ไม่พบแผนการเรียนของคุณในระบบ กรุณาตรวจสอบข้อมูลโปรไฟล์ก่อนใช้ตัวคำนวณนี้</p>`;
    return;
  }

  // โหลดรายวิชาจริงให้อัตโนมัติสำหรับทุกเทอมก่อนหน้าที่ยังไม่เคยกรอก (ไม่ไปทับเทอมที่มีข้อมูลอยู่แล้ว)
  let grades=DB.g('grades')||[];
  let addedAny=false;
  priorTerms.forEach(([plv,ptm])=>{
    const already=grades.some(g=>g.stu===CUR.username&&g.lv===plv&&g.tm===ptm);
    if(already)return;
    const key=`${plv} ${ptm}`;
    const subs=CURRICULUM_DATA[plan]&&CURRICULUM_DATA[plan][key];
    if(subs&&subs.length){
      subs.forEach(sub=>{
        grades.push({stu:CUR.username,sub:sub.sub,grp:sub.grp,grade:4.0,cr:sub.cr,lv:plv,tm:ptm});
      });
      addedAny=true;
    }
  });
  if(addedAny)DB.s('grades',grades);
  grades=DB.g('grades')||[]; // re-read หลังบันทึก

  const optionsHTML=v=>[4.0,3.5,3.0,2.5,2.0,1.5,1.0,0].map(o=>`<option value="${o}" ${v===o?'selected':''}>${o.toFixed(1)}</option>`).join('');

  const sections=priorTerms.map(([plv,ptm])=>{
    const key=`${plv} ${ptm}`;
    const termGrades=grades.filter(g=>g.stu===CUR.username&&g.lv===plv&&g.tm===ptm);
    if(!termGrades.length){
      // ไม่พบข้อมูลหลักสูตรของแผนนี้ในเทอมนี้ -> ให้กรอกเกรดเฉลี่ย+หน่วยกิตรวมแทน
      const manual=getManualTermData(plv,ptm);
      return `<div class="gap-card warning" style="margin-bottom:12px">
        <div style="font-weight:600;color:var(--pri2);margin-bottom:8px">${plv} ${ptm} <span style="font-weight:400;font-size:.8rem;color:var(--muted)">(ไม่พบรายวิชาในหลักสูตร กรุณากรอกเกรดเฉลี่ยแทน)</span></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="flex:1;min-width:150px"><label style="font-size:.82rem;color:var(--muted)">เกรดเฉลี่ย (GPA)</label>
          <input type="number" step="0.01" min="0" max="4" id="mt-gpa-${plv}-${ptm}" value="${manual?manual.gpa:''}" placeholder="เช่น 3.10"></div>
          <div style="flex:1;min-width:150px"><label style="font-size:.82rem;color:var(--muted)">หน่วยกิตรวม</label>
          <input type="number" step="0.5" min="0.5" id="mt-cr-${plv}-${ptm}" value="${manual?manual.credits:''}" placeholder="เช่น 11"></div>
        </div>
      </div>`;
    }
    return `<div style="margin-bottom:14px">
      <div style="font-weight:600;color:var(--pri2);margin-bottom:6px">📘 ${plv} ${ptm}</div>
      <table class="g-table"><thead><tr><th>วิชา</th><th>กลุ่มสาระ</th><th>หน่วยกิต</th><th>เกรด</th></tr></thead><tbody>
      ${termGrades.map(g=>`<tr>
        <td>${g.sub}</td><td><span class="badge blue">${g.grp}</span></td><td>${g.cr}</td>
        <td><select onchange="updatePriorGrade('${plv}','${ptm}','${g.sub.replace(/'/g,"\\'")}',this.value)">${optionsHTML(g.grade)}</select></td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
  }).join('');

  box.innerHTML=`<div style="border-top:1px solid var(--border);padding-top:14px;margin-top:6px">
    <p style="font-size:.88rem;color:var(--muted);margin-bottom:12px">ระบบดึงรายวิชาตามหลักสูตรของคุณตั้งแต่ <strong>ม.4 เทอม 1</strong> ถึงเทอมก่อนหน้า <strong>${lv} ${tm}</strong> มาให้แล้ว (ค่าเริ่มต้นตั้งไว้ที่ 4.0) กรุณาแก้เกรดแต่ละวิชาให้ตรงกับที่ได้จริง แล้วกด "ยืนยัน" ด้านล่าง</p>
    ${sections}
    <button class="btn sm" style="margin-top:6px" onclick="calcRequiredGradeUI('${lv}','${tm}')">✅ ยืนยันและคำนวณเกรดขั้นต่ำ</button>
  </div>`;
}

// เปลี่ยนเกรดของวิชาในเทอมก่อนหน้า ระหว่างที่ยังไม่กดยืนยัน (บันทึกลง DB ทันทีแบบไม่ re-render ทั้งหน้า)
function updatePriorGrade(lv,tm,sub,val){
  let grades=DB.g('grades')||[];
  const g=grades.find(x=>x.stu===CUR.username&&x.lv===lv&&x.tm===tm&&x.sub===sub);
  if(g){g.grade=parseFloat(val);DB.s('grades',grades);}
}

// ขั้นที่ 2: อ่านเกรดจริงของทุกเทอมก่อนหน้า (ที่กรอก/แก้ไว้) รวมกับ GPAX สะสมยกมา
// แล้วคำนวณเกรดเฉลี่ยขั้นต่ำที่ต้องทำใน "เทอมที่เลือกเทอมเดียว" เทียบกับเกณฑ์ขั้นต่ำของคณะเป้าหมาย
function calcRequiredGradeUI(lv,tm){
  const grades=(DB.g('grades')||[]).filter(g=>g.stu===CUR.username);
  const stuInfo=(DB.g('students')||[]).find(s=>s.username===CUR.username);
  const prevGPAX=stuInfo&&stuInfo.prevGPAX?parseFloat(stuInfo.prevGPAX):0;
  const prevCredits=stuInfo&&stuInfo.prevCredits?parseFloat(stuInfo.prevCredits):0;
  let knownTC=prevCredits, knownTP=prevGPAX*prevCredits;

  for(const[plv,ptm]of CALC_PRIOR_TERMS){
    const termGrades=grades.filter(g=>g.lv===plv&&g.tm===ptm);
    if(termGrades.length){
      termGrades.forEach(g=>{knownTC+=g.cr;knownTP+=g.cr*g.grade});
      continue;
    }
    const gEl=$(`mt-gpa-${plv}-${ptm}`), cEl=$(`mt-cr-${plv}-${ptm}`);
    const gpa=gEl?parseFloat(gEl.value):NaN;
    const cr=cEl?parseFloat(cEl.value):NaN;
    if(isNaN(gpa)||isNaN(cr)||cr<=0){alert(`กรุณากรอกเกรดเฉลี่ยและหน่วยกิตของ ${plv} ${ptm} ให้ครบก่อนคำนวณ`);return}
    if(gpa<0||gpa>4){alert(`GPA ของ ${plv} ${ptm} ต้องอยู่ระหว่าง 0.00-4.00`);return}
    saveManualTermData(plv,ptm,gpa,cr);
    knownTC+=cr;knownTP+=gpa*cr;
  }

  const targets=(DB.g('student_targets')||[]).filter(t=>t.stu===CUR.username);
  let maxMin=0;
  targets.forEach(t=>{const tc=TCAS_DATA.find(d=>d.uni===t.uni&&d.fac===t.fac);if(tc&&tc.min>maxMin)maxMin=tc.min});
  if(!maxMin)maxMin=3;

  // ประมาณหน่วยกิตของเทอมที่อยากรู้ (ยังไม่ถึง จึงยังไม่มีรายวิชาจริง) จากโครงสร้างหลักสูตร
  const plan=getCurrentPlanName();
  const targetTC=getTermCurriculumCredits(plan,lv,tm);

  const box=$('calc-result');
  const requiredAvg=(maxMin*(knownTC+targetTC)-knownTP)/targetTC;
  const gradeSteps=[0,1,1.5,2,2.5,3,3.5,4];
  const roundUp=v=>{for(const s of gradeSteps){if(s>=v-1e-9)return s} return null};

  if(requiredAvg<=0){
    box.innerHTML=`<div class="gap-card success">🎉 จากเกรดที่กรอก คุณถึงเกณฑ์แล้ว! แม้ ${lv} ${tm} จะได้ 0 ทุกวิชา GPAX รวมก็ยังไม่ต่ำกว่าเกณฑ์ขั้นต่ำ ${maxMin.toFixed(2)} (แต่อย่าลืมตั้งใจเรียนต่อไปนะครับ 💪)</div>`;
  } else if(requiredAvg>4){
    box.innerHTML=`<div class="gap-card danger">❌ ต้องการเกรดเฉลี่ย <strong>${requiredAvg.toFixed(2)}</strong> ใน ${lv} ${tm} ซึ่งเกินกว่า 4.00 จึงเป็นไปไม่ได้ที่จะไล่เกณฑ์ให้ทันภายในเทอมเดียว แนะนำให้ปรึกษาคุณครูแนะแนวเพื่อวางแผนระยะยาว หรือพิจารณาคณะ/มหาวิทยาลัยสำรองที่มีเกณฑ์เกรดต่ำกว่านี้</div>`;
  } else {
    const suggested=roundUp(requiredAvg);
    box.innerHTML=`<div class="gap-card ${requiredAvg>3.25?'warning':'success'}">
      <strong>ต้องทำเกรดเฉลี่ยอย่างน้อย ${requiredAvg.toFixed(2)}</strong> ใน <strong>${lv} ${tm}</strong> (ประมาณ ${targetTC} หน่วยกิต) เพื่อให้ GPAX สะสมถึงเกณฑ์ขั้นต่ำของคณะเป้าหมาย ${maxMin.toFixed(2)}
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin:10px 0">💡 เนื่องจากเกรดเลือกได้เป็นขั้น (0, 1, 1.5, ... 4.0) แนะนำให้ตั้งเป้าอย่างน้อย <strong>${suggested!==null?suggested.toFixed(1):'4.0'}</strong> ทุกวิชาใน ${lv} ${tm} เพื่อความชัวร์ (เผื่อบางวิชาทำได้ต่ำกว่าที่ตั้งใจ) — จำนวนหน่วยกิตเป็นค่าประมาณจากโครงสร้างหลักสูตร อาจคลาดเคลื่อนเล็กน้อยจากจำนวนวิชาจริงที่จะลงทะเบียน</p>`;
  }
}


function renderGrades(m){
  const grades=(DB.g('grades')||[]).filter(g=>g.stu===CUR.username);
  const gpax=calcGPAX(CUR.username);
  const groups=[...new Set(grades.map(g=>g.grp))];
  const targets=(DB.g('student_targets')||[]).filter(t=>t.stu===CUR.username);
  const stuInfo=(DB.g('students')||[]).find(s=>s.username===CUR.username);
  const normalize = (p) => {
    if (!p) return '';

function autoLoadCurriculum(){
  const lv = $('auto-lv').value;
  const tm = $('auto-tm').value;
  const stuInfo = (DB.g('students')||[]).find(s=>s.username===CUR.username);
  let plan = stuInfo ? stuInfo.plan : '';

  // แปลงชื่อแผนการเรียนให้ตรงกับคีย์ใน CURRICULUM_DATA (รองรับข้อมูลเก่าใน LocalStorage)
  const normalize = (p) => {
    if (!p) return '';
    p = p.trim();
    if (p.includes('วิศวกรรมข้อมูล') || p.includes('ปัญญาประดิษฐ์') || p.includes('วิทย์-เอไอ') || p.includes('วิทย์เอไอ')) return 'วิทย์-เอไอ';
    if (p.includes('วิทยาศาสตร์-คณิตศาสตร์') || p.includes('วิทย์-คณิต') || p.includes('วิทย์คณิต')) return 'วิทย์-คณิต';
    if (p.includes('ศิลป์-คณิต') || p.includes('ศิลป์-คำนวณ') || p.includes('ศิลป์คำนวณ')) return 'ศิลป์-คำนวณ';
    if (p.includes('ฝรั่งเศส')) return 'ศิลป์-ฝรั่งเศส';
    if (p.includes('จีน')) return 'ศิลป์-จีน';
    if (p.includes('ญี่ปุ่น')) return 'ศิลป์-ญี่ปุ่น';
    if (p.includes('คหกรรม')) return 'ศิลป์-คหกรรม';
    return p;
  };
  plan = normalize(plan);
  const key = `${lv} ${tm}`;

  if(!CURRICULUM_DATA[plan] || !CURRICULUM_DATA[plan][key]){
    alert(`ไม่พบข้อมูลหลักสูตรสำหรับแผน "${plan}" ในระดับชั้น ${key}`);
    return;
  }

  // Clear existing grades for the selected semester to avoid duplicates
  let grades = DB.g('grades')||[];
  grades = grades.filter(g => !(g.stu===CUR.username && g.lv===lv && g.tm===tm));

  // Add all subjects from the curriculum database
  const subjects = CURRICULUM_DATA[plan][key];
  subjects.forEach(sub => {
    grades.push({
      stu: CUR.username,
      sub: sub.sub,
      grp: sub.grp,
      grade: 4.0, // Default grade to be adjusted
      cr: sub.cr,
      lv: lv,
      tm: tm
    });
  });

  DB.s('grades', grades);
  alert(`ดึงข้อมูลรายวิชาแผน ${plan} ${lv} ${tm} จำนวน ${subjects.length} วิชาเรียบร้อยแล้ว!`);
  renderPage();
}

  const counts = {};
  for(let i=0; i<SURVEY_QUESTIONS.length; i++){
    const val = document.querySelector(`input[name=sq${i}]:checked`).value;
    counts[val] = (counts[val]||0) + 1;

  // Find house with max count
  let maxVal = 1, maxCount = 0;
  for(const k in counts){
    if(counts[k] > maxCount){
      maxCount = counts[k];
      maxVal = parseInt(k);
    }
  }

  const recHouse = HOUSES.find(h => h.id === maxVal) || HOUSES[0];

  // Save survey result status
  const pts=DB.g('student_pretests')||[];
  const exist=pts.findIndex(p=>p.stu===CUR.username&&p.hId===hId);
  if(exist>=0)pts[exist]={stu:CUR.username,hId,score:100,status:'completed'};

    ${q.o.map((opt,j)=>`<label class="pt-opt"><input type="radio" name="ptq${i}" value="${j}" ${j===0?'checked':''}><span>${opt}</span></label>`).join('')}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:24px"><button class="btn sec" onclick="submitPretest(${hId})" style="min-width:200px;font-size:1.1rem;padding:14px 32px">📩 ส่งคำตอบ</button></div>
  </div>`;
}
function submitPretest(hId){
  const qs=PRETEST[hId];let correct=0;
  qs.forEach((q,i)=>{const sel=document.querySelector(`input[name=ptq${i}]:checked`);if(sel&&parseInt(sel.value)===q.a)correct++});
  const score=Math.round(correct/qs.length*100);
  // Save
  const pts=DB.g('student_pretests')||[];
  const exist=pts.findIndex(p=>p.stu===CUR.username&&p.hId===hId);
  if(exist>=0)pts[exist]={stu:CUR.username,hId,score,status:'completed'};
  else pts.push({stu:CUR.username,hId,score,status:'completed'});
  DB.s('student_pretests',pts);
  const house=HOUSES.find(h=>h.id===hId);
  const rec=getPracRec(score);
  $('main-content').innerHTML=`<div style="max-width:600px;margin:60px auto">
    <div class="pt-result">
      <div style="font-size:1.2rem;margin-bottom:16px">📊 ผลคะแนน Pre-Test: <strong>${house.name}</strong></div>
      <div class="pt-score" style="color:${rec.color}">${score}<span style="font-size:1.6rem">/100</span></div>
      <div style="margin:20px 0"><span class="badge" style="background:${rec.color}22;color:${rec.color};font-size:1rem;padding:8px 20px">ระดับ: ${rec.lvl}</span></div>
      <p style="font-size:1.05rem;margin-bottom:8px">🗓️ แนะนำให้ฝึกฝนโจทย์อย่างน้อย <strong style="color:${rec.color}">${rec.days} วันต่อสัปดาห์</strong></p>
      <p style="font-size:.9rem;color:var(--muted)">ถูก ${Math.round(score*qs.length/100)} จาก ${qs.length} ข้อ</p>
      <div style="margin-top:24px;display:flex;gap:12px;justify-content:center"><button class="btn" onclick="PAGE='pretest';renderPage()">← กลับ</button><button class="btn sec" onclick="PAGE='practice';renderSidebar();renderPage()">ไปห้องฝึกฝนโจทย์ →</button></div>
    </div>
  </div>`;
}

function renderPractice(m){
  const pts=pretestOf(CUR.username);
  const completed=pts.filter(p=>p.status==='completed');
  if(!completed.length){
    m.innerHTML=`<h2 class="page-title">🎯 ห้องฝึกฝนโจทย์</h2>
    <div class="widget" style="text-align:center;padding:60px 20px">
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h3>กรุณาทำ Pre-Test หรือแบบสอบถามก่อน</h3>
      <p style="color:var(--muted);margin-bottom:20px">คุณต้องทำแบบทดสอบวัดระดับอย่างน้อย 1 บ้าน เพื่อปลดล็อกห้องฝึกฝนโจทย์</p>
      <button class="btn" onclick="PAGE='pretest';renderSidebar();renderPage()">ไปหน้าแบบทดสอบ</button>
    </div>`;
    return;
  }
  const logs=(DB.g('practice')||[]).filter(p=>p.stu===CUR.username);
  const today=new Date().toISOString().slice(0,10);
  const didToday=logs.some(l=>l.date===today);
  const thisWeek=logs.filter(l=>{const d=new Date(l.date);const diff=(new Date()-d)/(1000*60*60*24);return diff<=7}).length;
  const bestPt=completed.reduce((a,b)=>a.score>b.score?a:b);
  const rec=getPracRec(bestPt.score);

  // Calendar: last 28 days
  const days=[];for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10))}

  m.innerHTML=`<h2 class="page-title">🎯 ห้องฝึกฝนโจทย์</h2>
  <div class="grid">
    <div class="widget"><div class="widget-label">เป้าหมายต่อสัปดาห์</div><div class="widget-val" style="color:${rec.color}">${rec.days} <span style="font-size:1rem">วัน</span></div><div class="widget-sub">ระดับ: ${rec.lvl} (จากผลประเมินของคุณ)</div></div>
    <div class="widget"><div class="widget-label">ทำไปแล้วสัปดาห์นี้</div><div class="widget-val">${thisWeek} <span style="font-size:1rem">วัน</span></div>
    <div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.min(100,thisWeek/parseInt(rec.days)*100)}%;background:var(--ok)"></div></div></div>
  </div>
  <div class="widget">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="widget-label" style="margin:0">📆 ปฏิทินฝึกฝน (28 วันล่าสุด)</div>
      ${!didToday?`<button class="btn sm sec" onclick="checkInPractice()">✅ เช็คอินวันนี้</button>`:`<span class="badge green">เช็คอินแล้ววันนี้ ✓</span>`}
    </div>
    <div class="prac-grid">${['จ','อ','พ','พฤ','ศ','ส','อา'].map(d=>`<div style="text-align:center;font-size:.8rem;color:var(--muted);font-weight:600">${d}</div>`).join('')}
    ${days.map(d=>{const done=logs.some(l=>l.date===d);const isToday=d===today;return`<div class="prac-day ${done?'done':''}" style="${isToday?'border-color:var(--pri);font-weight:700':''}"><span style="font-size:.75rem">${new Date(d).getDate()}</span>${done?'<span style="font-size:.7rem">✓</span>':''}</div>`}).join('')}
    </div>
  </div>`;
}
function checkInPractice(){
  const logs=DB.g('practice')||[];
  const today=new Date().toISOString().slice(0,10);
  if(!logs.some(l=>l.stu===CUR.username&&l.date===today)){logs.push({stu:CUR.username,date:today});DB.s('practice',logs)}
  renderPage();
}

function renderForum(m){
  const isTeacher=CUR.role!=='student';
  const houses=isTeacher?HOUSES:houseOf(CUR.username);
  const houseIds=houses.map(h=>h.id);
  const threads=(DB.g('threads')||[]).filter(t=>houseIds.includes(t.hId)).sort((a,b)=>new Date(b.at)-new Date(a.at));
  const replies=DB.g('replies')||[];

  m.innerHTML=`<h2 class="page-title">💬 ถามตอบปัญหาโจทย์</h2>
  ${CUR.role==='student'?`<button class="btn sm" onclick="showNewThread()" style="margin-bottom:16px">+ ตั้งกระทู้ใหม่</button>`:''}
  <div id="forum-area">
  ${threads.map(t=>{
    const rCount=replies.filter(r=>r.tId===t.id).length;
    const h=HOUSES.find(x=>x.id===t.hId);
    const author=getUserByName(t.author);
    return`<div class="thread-card" onclick="openThread(${t.id})">
      <div class="thread-meta"><span>${author?author.displayName:t.author} · <span class="badge blue" style="background:${h?h.color+'22':''};color:${h?h.color:''}">${h?h.name:''}</span></span><span class="reply-count">${rCount} คำตอบ</span></div>
      <h4 style="margin-bottom:6px">${t.title}</h4>
      <p style="font-size:.9rem;color:var(--muted)">${t.body.slice(0,120)}...</p>
      <small style="color:var(--muted)">${fmtDate(t.at)}</small>
    </div>`}).join('')}
  ${!threads.length?'<p style="color:var(--muted);text-align:center;padding:30px">ยังไม่มีกระทู้ในบ้านของคุณ</p>':''}
  </div>`;
}
function showNewThread(){
  const houses=houseOf(CUR.username);
  $('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box">
    <h3 style="margin-bottom:16px">✏️ ตั้งกระทู้ใหม่</h3>
    <div class="auth-group"><label>บ้าน</label><select id="nt-house">${houses.map(h=>`<option value="${h.id}">${h.name}</option>`).join('')}</select></div>
    <div class="auth-group"><label>หัวข้อ</label><input id="nt-title" placeholder="เช่น สงสัยโจทย์ฟิสิกส์เรื่อง..."></div>
    <div class="auth-group"><label>รายละเอียด</label><textarea id="nt-body" placeholder="อธิบายรายละเอียดโจทย์หรือคำถามที่ต้องการถาม..."></textarea></div>
    <div style="display:flex;gap:12px;margin-top:16px"><button class="btn" onclick="postThread()">โพสต์</button><button class="btn ghost" onclick="closeModal()">ยกเลิก</button></div>
  </div></div>`;
}
function postThread(){
  const hId=parseInt($('nt-house').value),title=$('nt-title').value.trim(),body=$('nt-body').value.trim();
  if(!title||!body){alert('กรุณากรอกข้อมูลให้ครบ');return}
  const ts=DB.g('threads')||[];
  const id=ts.length?Math.max(...ts.map(t=>t.id))+1:1;
  ts.push({id,hId,title,body,author:CUR.username,at:new Date().toISOString()});
  DB.s('threads',ts);closeModal();renderPage();
}
function openThread(id){
  const t=(DB.g('threads')||[]).find(x=>x.id===id);if(!t)return;
  const rs=(DB.g('replies')||[]).filter(r=>r.tId===id);
  const h=HOUSES.find(x=>x.id===t.hId);
  const author=getUserByName(t.author);
  const m=$('main-content');
  m.innerHTML=`<button class="btn sm ghost" onclick="renderPage()" style="margin-bottom:16px">← กลับ</button>
  <div style="max-width:800px">
    <div class="widget" style="border-top:4px solid ${h?h.color:'var(--pri)'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><strong>${author?author.displayName:t.author}</strong><span class="badge blue">${h?h.name:''}</span><small style="color:var(--muted)">${fmtDate(t.at)}</small></div>
      <h3>${t.title}</h3>
      <p style="margin-top:8px;line-height:1.8">${t.body}</p>
    </div>
    <h4 style="margin:20px 0 12px">💬 คำตอบ (${rs.length})</h4>
    ${rs.map(r=>{const ra=getUserByName(r.author);return`<div class="reply-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><strong>${ra?ra.displayName:r.author}</strong><small style="color:var(--muted)">${fmtDate(r.at)}</small></div><p style="line-height:1.8">${r.body}</p></div>`}).join('')}
    <div class="widget" style="margin-top:16px">
      <h4 style="margin-bottom:12px">✍️ เขียนคำตอบ</h4>
      <textarea id="reply-body" placeholder="เขียนคำตอบหรือเฉลยวิธีทำของคุณ..."></textarea>
      <button class="btn sm" onclick="postReply(${id})" style="margin-top:12px">ส่งคำตอบ</button>
    </div>
  </div>`;
}
function postReply(tId){
  const body=$('reply-body').value.trim();if(!body){alert('กรุณาเขียนคำตอบ');return}
  const rs=DB.g('replies')||[];
  const id=rs.length?Math.max(...rs.map(r=>r.id))+1:1;
  rs.push({id,tId,body,author:CUR.username,at:new Date().toISOString()});
  DB.s('replies',rs);openThread(tId);
}

function renderSeniors(m){
  const houses=houseOf(CUR.username);
  const houseIds=houses.map(h=>h.id);
  const seniors=ALUMNI.filter(a=>houseIds.includes(a.hId));
  m.innerHTML=`<h2 class="page-title">🎓 ทำเนียบรุ่นพี่ในบ้าน</h2>
  <div class="alumni-grid">
  ${seniors.map(s=>{const h=HOUSES.find(x=>x.id===s.hId);return`<div class="alumni-card">
    <div class="alumni-avatar">${s.av}</div>
    <div class="alumni-name">${s.name}</div>
    <div class="alumni-tag">รอบ TCAS ${s.rd}</div>
    <p style="font-size:.92rem"><strong>${s.fac}</strong><br>${s.dept}<br><span style="color:var(--pri)">${s.uni}</span></p>
    <p style="font-size:.85rem;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:8px">${s.sc}</p>
  </div>`}).join('')}
  ${!seniors.length?'<p style="color:var(--muted)">ยังไม่มีข้อมูลรุ่นพี่ในบ้านที่คุณสังกัด</p>':''}
  </div>`;
}

// ============================
// TEACHER PAGES
// ============================
function getTeacherHouse(){
  const name=CUR.username.replace('baan','บ้าน');
  return HOUSES.find(h=>h.name===name)||HOUSES[0];
}
function getStudentsInHouse(hId){
  const sh=(DB.g('student_houses')||[]).filter(s=>s.hId===hId);
  return sh.map(s=>{
    const u=getUserByName(s.stu);
    const st=(DB.g('students')||[]).find(x=>x.username===s.stu);
    return u?{...u,...(st||{}),gpax:calcGPAX(s.stu),color:getColor(s.stu),username:s.stu}:null;
  }).filter(Boolean);
}

function renderTeacherOverview(m){
  const house=getTeacherHouse();
  const students=getStudentsInHouse(house.id);
  const avgGPAX=students.length?students.reduce((s,x)=>s+x.gpax,0)/students.length:0;
  const pts=(DB.g('student_pretests')||[]).filter(p=>p.hId===house.id&&p.status==='completed');
  const avgPT=pts.length?pts.reduce((s,x)=>s+x.score,0)/pts.length:0;
  const reds=students.filter(s=>s.color==='red').length;
  const yellows=students.filter(s=>s.color==='yellow').length;
  const greens=students.filter(s=>s.color==='green').length;

  m.innerHTML=`<h2 class="page-title">📊 แผงควบคุม: <span style="color:${house.color}">${house.name}</span></h2>
  <div class="grid">
    <div class="widget"><div class="widget-label">จำนวนนักเรียน</div><div class="widget-val">${students.length}</div><div class="widget-sub">คน</div></div>
    <div class="widget"><div class="widget-label">GPAX เฉลี่ย</div><div class="widget-val" style="color:${avgGPAX>=3?'var(--ok)':avgGPAX>=2.5?'var(--warn)':'var(--err)'}">${avgGPAX.toFixed(2)}</div></div>
    <div class="widget"><div class="widget-label">คะแนน Pre-Test เฉลี่ย</div><div class="widget-val">${avgPT.toFixed(0)}<span style="font-size:1rem">/100</span></div><div class="widget-sub">${pts.length} คนทำแล้ว</div></div>
  </div>
  <div class="widget">
    <div class="widget-label">สัดส่วนสถานะนักเรียน</div>
    <div style="display:flex;gap:20px;margin-top:8px">
      <div style="display:flex;align-items:center;gap:8px"><span class="dot-status green"></span><strong>${greens}</strong> ผ่านเกณฑ์ดี</div>
      <div style="display:flex;align-items:center;gap:8px"><span class="dot-status yellow"></span><strong>${yellows}</strong> ใกล้เคียงเกณฑ์</div>
      <div style="display:flex;align-items:center;gap:8px"><span class="dot-status red"></span><strong>${reds}</strong> ต่ำกว่าเกณฑ์</div>
    </div>
    <div class="pbar-wrap" style="margin-top:12px;height:20px;display:flex;border-radius:10px;overflow:hidden">
      <div style="width:${greens/Math.max(students.length,1)*100}%;background:var(--ok);height:100%"></div>
      <div style="width:${yellows/Math.max(students.length,1)*100}%;background:var(--warn);height:100%"></div>
      <div style="width:${reds/Math.max(students.length,1)*100}%;background:var(--err);height:100%"></div>
    </div>
  </div>`;
}

function renderRoster(m){
  const house=getTeacherHouse();
  const students=getStudentsInHouse(house.id);

  m.innerHTML=`<h2 class="page-title">👥 รายชื่อนักเรียน: <span style="color:${house.color}">${house.name}</span></h2>
  <p style="color:var(--muted);margin-bottom:16px">จุดสีแสดงสถานะเกรดเทียบกับเกณฑ์คณะเป้าหมาย: <span class="dot-status green"></span>ดี <span class="dot-status yellow"></span>ใกล้เคียง <span class="dot-status red"></span>ต่ำกว่า</p>
  <table class="roster-table">
    <thead><tr><th>สถานะ</th><th>ชื่อ-นามสกุล</th><th>รหัส</th><th>GPAX</th><th>แผนการเรียน</th><th>คณะเป้าหมาย</th><th>Pre-Test</th></tr></thead>
    <tbody>
    ${students.map(s=>{
      const targets=(DB.g('student_targets')||[]).filter(t=>t.stu===s.username);
      const pt=(DB.g('student_pretests')||[]).find(p=>p.stu===s.username&&p.hId===house.id);
      const isSurvey = house.id === 9;
      return`<tr>
        <td><span class="dot-status ${s.color}"></span></td>
        <td><strong>${s.displayName}</strong></td>
        <td>${s.username}</td>
        <td><strong style="color:${s.gpax>=3?'var(--ok)':s.gpax>=2.5?'var(--warn)':'var(--err)'}">${s.gpax.toFixed(2)}</strong></td>
        <td>${s.plan||'—'}</td>
        <td>${targets.length?targets.map(t=>`<div style="font-size:.85rem">${t.uni} — ${t.fac}</div>`).join(''):'—'}</td>
        <td>${pt?`<span class="badge ${pt.score>=76?'green':pt.score>=36?'blue':'pink'}">${isSurvey?'ประเมินแล้ว':`${pt.score}/100`}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`}).join('')}
    </tbody>
  </table>
  ${!students.length?'<p style="color:var(--muted);text-align:center;padding:30px">ยังไม่มีนักเรียนในบ้านนี้</p>':''}`;
}

// ============================
// AUTO-LOGIN & INIT
// ============================
(function(){
  const saved=localStorage.getItem('gp_session');
  if(saved){
    const user=getUserByName(saved);
    if(user){CUR=user;enterApp();return}
  }
  show('view-auth');
})();
</script>
